experiment_name: gcm_flow_history_forcing_test
run_module: run_ensemble_gcm

simulation_type: ensemble
parameterization_type: flow # options: flow

init_states_type: perturbed

results_dir: tests/run/output
total_time: 5

K: 3
J: 2
f_schedule:
  type: oscillating
  Fmean: 4
  amp: 2
  freq: 0.5
h: 1.0
b: 2.0
c: 2.0

si: 0.05
dt: 0.01

n_init_states: 2
n_ens_members: 2

# Flow variations (flow needs to be trained with these settings)
include_forcing_in_cond: true
delta_t: 2 # number of previous time steps included in the conditioning input

model_seed_start: 3

cpu_count: 1
seed: 0

time_stepping: RK2
noise_type: ar_p
ar_order: 2
flow_device: cpu

init_states_dir: tests/run/data/gcm_init_perturbed
params_dir: tests/run/data/params_flow_history_forcing
