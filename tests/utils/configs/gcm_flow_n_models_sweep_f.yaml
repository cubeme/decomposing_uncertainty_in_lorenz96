experiment_name: gcm_flow_n_models_ensemble
run_module: run_ensemble_gcm
simulation_type: ensemble
parameterization_type: flow # options: flow

init_states_type: perturbed

results_dir: tests/utils/output

K: 8
J: 32
f_schedule:
  type: linear
  F0:
    - 19.0
    - 20.0
  F1: 23.0
  t0: 0.0
  t1: 5.0
c: 10.0
h: 1.0
b: 10.0

n_init_states: 2
n_ens_members: 2

noise_type: ar_p
ar_order: 1

# Flow variations
include_forcing_in_cond: False
delta_t: 0 # number of previous time steps included in the conditioning input
use_flexible_tails: false
ttf_init_lambda: 0.0

init_states_dir: tests/run/data/gcm_init_perturbed
params_dir: tests/run/data/params_flow

si: 0.05
dt: 0.01
total_time: 5
time_stepping: RK2
seed: 0
flow_device: cpu
