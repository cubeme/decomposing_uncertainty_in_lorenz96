experiment_name: fit_params_flow_tail_history_forcing
run_module: run_flow_training

results_dir: tests/submit/output

l96_data_dir: tests/run/data/l96_train
l96_load_backend: numpy


K: 8
J: 32
f_schedule:
  type: constant
  F: 20.0
h: 1.0
b: 10.0
c: 10.0
si: 0.1

n_coupling_layers: 1
hidden_dims: [2]

# Flow variations
include_forcing_in_cond: true
delta_t: 2 # number of previous time steps included in the conditioning input
use_flexible_tails: true
ttf_init_lambda: 0.1

epochs: 1
batch_size: 4
lr: 0.001
weight_decay: 0.0
grad_clip: null

train_perc: 0.5
val_perc: 0.25
test_perc: 0.25

device: cpu
devices: 1
strategy: null
num_workers_data_loader: 2

tensorboard_log_dir: null
early_stopping_patience: 0
early_stopping_min_delta: 0.0

fit_ar_parameters: True
ar_order: [1, 3]
fit_method: "yule_walker"

seed: 0
