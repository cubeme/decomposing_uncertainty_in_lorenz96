experiment_name: fitted_parameters
run_module: run_parameter_fitting_baseline

# L96 data source
l96_data_dir: results/l96_training_data_t20000/F_20.0
l96_load_backend: zarr

params_to_fit:
  - poly_coefs
  - ar_p

# L96 model parameters
K: 8                
J: 32               
F: 20.0       
h: 1.0              
b: 10.0           
c: 10.0    
si: 0.005  # sampling interval used to generate L96 data

# Polynomial fitting
poly_order: 3

# AR(p) parameter fitting
ar_order: 1  
fit_method: least_squares  # least_squares, yule_walker

# Training parameters
train_perc: 0.15  # percentage of data to use for training

# Output
results_dir: results

# Miscellaneous
seed: 0
